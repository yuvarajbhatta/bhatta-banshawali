<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Register a new user account for the Family Tree App.</p>

    <form th:action="@{/signup}" th:object="${signupForm}" method="post">
      <div th:if="${#fields.hasErrors('*')}" class="error-message">
        Please fix the highlighted fields.
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" th:field="*{username}" required />
        <div class="error-message" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" th:field="*{password}" required />
        <div class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" th:field="*{confirmPassword}" required />
        <div class="error-message" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
      </div>

      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <p class="bottom-link">
      Already have an account?
      <a href="/login">Login</a>
    </p>
  </div>
</div>
</body>
</html>
