<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="switcher" class="language-switch" style="display:flex; justify-content:flex-end; align-items:center; padding:12px 20px 0 20px;">
    <nav aria-label="Language switch" style="display:flex; align-items:center; gap:8px; font-size:14px;">
        <a href="#"
           onclick="switchLanguage('en'); return false;"
           th:style="${#locale.language == 'en'} ? 'font-weight:700; color:#111827; text-decoration:none;' : 'font-weight:500; color:#6b7280; text-decoration:none;'">
            EN
        </a>
        <span style="color:#9ca3af;">|</span>
        <a href="#"
           onclick="switchLanguage('ne'); return false;"
           th:style="${#locale.language == 'ne'} ? 'font-weight:700; color:#111827; text-decoration:none;' : 'font-weight:500; color:#6b7280; text-decoration:none;'">
            NP
        </a>
    </nav>
</div>

<script th:fragment="script">
    function switchLanguage(language) {
        const url = new URL(window.location.href);
        url.searchParams.set('lang', language);
        window.location.href = url.toString();
    }
</script>
</body>
</html>
