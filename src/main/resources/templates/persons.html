<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{persons.title}">All Persons</title>
    <link rel="stylesheet" href="/css/persons.css">
</head>
<body>
<div th:replace="~{fragments/language-switch :: switcher}"></div>

<div class="container">
    <h1 th:text="#{persons.title}">All Persons</h1>

    <div class="top-links">
        <a href="/" th:text="#{nav.backHome}">Back Home</a>
        &nbsp;|&nbsp;
        <span sec:authorize="hasRole('ADMIN')">
            <a href="/persons/new" th:text="#{nav.addNewPerson}">Add New Person</a>
        </span>
    </div>

    <form th:action="@{/persons}" method="get" class="search-form">
        <input type="text" name="keyword" th:value="${keyword}" th:placeholder="#{persons.search.placeholder}" />
        <button type="submit" class="btn btn-primary" th:text="#{persons.search}">Search</button>
        <a href="/persons" class="btn btn-secondary" th:text="#{persons.clear}">Clear</a>
    </form>

    <table th:if="${!#lists.isEmpty(persons)}">
        <tr>
            <th th:text="#{persons.id}">ID</th>
            <th th:text="#{persons.name}">Name</th>
            <th th:text="#{person.middleName}">Middle Name</th>
            <th th:text="#{person.lastName}">Last Name</th>
            <th th:text="#{persons.generation}">Generation</th>
            <th th:text="#{person.gender}">Gender</th>
            <th th:text="#{person.birthDate}">Birth Date</th>
            <th sec:authorize="hasRole('ADMIN')" th:text="#{persons.actions}">Actions</th>
        </tr>

        <tr th:each="person : ${persons}">
            <td th:text="${person.id}"></td>
            <td>
                <a class="person-link" th:href="@{'/persons/' + ${person.id}}"
                   th:text="${@personDisplay.givenName(person, #locale)}"></a>
            </td>
            <td th:text="${#locale.language == 'ne' ? (person.middleNameNepali ?: person.middleName) : person.middleName}"></td>
            <td th:text="${@personDisplay.familyName(person, #locale)}"></td>
            <td th:text="${person.generationNumber}"></td>
            <td th:text="${person.gender != null ? #messages.msg('gender.' + person.gender) : ''}"></td>
            <td th:text="${person.birthDate}"></td>
            <td class="actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/persons/edit/' + ${person.id}}" th:text="#{persons.edit}">Edit</a>
                |
                <a th:href="@{'/persons/delete/' + ${person.id}}"
                   th:attr="onclick=|return confirm('${#messages.msg('persons.delete.confirm')}')|"
                   th:text="#{persons.delete}">Delete</a>
            </td>
        </tr>
    </table>

    <div class="empty-state" th:if="${#lists.isEmpty(persons)}" th:text="#{persons.empty}">
        No persons found.
    </div>
</div>

<script th:replace="~{fragments/language-switch :: script}"></script>
</body>
</html>
