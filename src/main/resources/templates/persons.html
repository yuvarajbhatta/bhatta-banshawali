<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>All Persons</title>
    <link rel="stylesheet" href="/css/persons.css">

</head>
<body>
<div class="container">
    <h1>All Persons</h1>

    <div class="top-links">
        <a href="/">Back Home</a>
        &nbsp;|&nbsp;
        <span sec:authorize="hasRole('ADMIN')">
            <a href="/persons/new">Add New Person</a>
        </span>
    </div>

    <form th:action="@{/persons}" method="get" class="search-form">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by first or last name" />
        <button type="submit" class="btn btn-primary">Search</button>
        <a href="/persons" class="btn btn-secondary">Clear</a>
    </form>

    <table th:if="${!#lists.isEmpty(persons)}">
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Middle Name</th>
            <th>Last Name</th>
            <th>Gender</th>
            <th>Birth Date</th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>

        <tr th:each="person : ${persons}">
            <td th:text="${person.id}"></td>
            <td>
                <a class="person-link" th:href="@{'/persons/' + ${person.id}}"
                   th:text="${person.firstName}"></a>
            </td>
            <td th:text="${person.middleName}"></td>
            <td th:text="${person.lastName}"></td>
            <td th:text="${person.generationNumber}"></td>
            <td th:text="${person.gender}"></td>
            <td th:text="${person.birthDate}"></td>
            <td class="actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/persons/edit/' + ${person.id}}">Edit</a>
                |
                <a th:href="@{'/persons/delete/' + ${person.id}}"
                   onclick="return confirm('Are you sure you want to delete this person?')">Delete</a>
            </td>
        </tr>
    </table>

    <div class="empty-state" th:if="${#lists.isEmpty(persons)}">
        No persons found.
    </div>
</div>
</body>
</html>
