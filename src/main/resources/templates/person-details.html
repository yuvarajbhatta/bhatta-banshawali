<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Person Details</title>
    <link rel="stylesheet" href="/css/person-details.css">

</head>
<body>
<div class="container">
    <h1 th:text="${person.firstName + ' ' + person.lastName}"></h1>

    <a href="/persons" class="back-link">Back to Persons</a>

    <div class="section">
        <h2>Parents</h2>

        <div class="info-row">
            <span class="label">Father:</span>
            <span th:if="${#lists.isEmpty(fathers)}" class="muted">Not added</span>
            <span th:each="rel : ${fathers}">
                <a class="person-link"
                   th:href="@{'/persons/' + ${rel.relatedPerson.id}}"
                   th:text="${rel.relatedPerson.firstName + ' ' + rel.relatedPerson.lastName}"></a>
            </span>
        </div>

        <div class="info-row">
            <span class="label">Mother:</span>
            <span th:if="${#lists.isEmpty(mothers)}" class="muted">Not added</span>
            <span th:each="rel : ${mothers}">
                <a class="person-link"
                   th:href="@{'/persons/' + ${rel.relatedPerson.id}}"
                   th:text="${rel.relatedPerson.firstName + ' ' + rel.relatedPerson.lastName}"></a>
            </span>
        </div>
    </div>

    <div class="section">
        <h2>Spouse</h2>
        <div th:if="${#lists.isEmpty(spouses)}" class="muted">Not added</div>
        <ul th:if="${!#lists.isEmpty(spouses)}">
            <li th:each="spouse : ${spouses}">
                <a class="person-link"
                   th:href="@{'/persons/' + ${spouse.id}}"
                   th:text="${spouse.firstName + ' ' + spouse.lastName}"></a>
            </li>
        </ul>
    </div>

    <div class="section">
        <h2>Children</h2>
        <div th:if="${#lists.isEmpty(children)}" class="muted">Not added</div>
        <ul th:if="${!#lists.isEmpty(children)}">
            <li th:each="child : ${children}">
                <a class="person-link"
                   th:href="@{'/persons/' + ${child.id}}"
                   th:text="${child.firstName + ' ' + child.lastName}"></a>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
