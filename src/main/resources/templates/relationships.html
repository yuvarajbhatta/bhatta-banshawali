<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="#{relationships.title}">All Relationships</title>
  <link rel="stylesheet" href="/css/relationships.css">
</head>
<body>
<div th:replace="~{fragments/language-switch :: switcher}"></div>

<div class="container">
  <h1 th:text="#{relationships.title}">All Relationships</h1>

  <div class="top-links">
    <a href="/" th:text="#{nav.backHome}">Back Home</a>
    &nbsp;|&nbsp;
    <span sec:authorize="hasRole('ADMIN')">
      <a href="/relationships/new" th:text="#{nav.addNewRelationship}">Add New Relationship</a>
    </span>
  </div>

  <table th:if="${!#lists.isEmpty(relationships)}">
    <tr>
      <th th:text="#{relationships.id}">ID</th>
      <th th:text="#{relationships.person}">Person</th>
      <th th:text="#{relationships.type}">Relationship Type</th>
      <th th:text="#{relationships.relatedPerson}">Related Person</th>
      <th sec:authorize="hasRole('ADMIN')" th:text="#{relationships.actions}">Actions</th>
    </tr>

    <tr th:each="rel : ${relationships}">
      <td th:text="${rel.id}"></td>
      <td th:text="${@personDisplay.fullName(rel.person, #locale)}"></td>
      <td th:text="${#messages.msg('relationshipType.' + rel.relationshipType.name())}"></td>
      <td th:text="${@personDisplay.fullName(rel.relatedPerson, #locale)}"></td>
      <td class="actions" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{'/relationships/edit/' + ${rel.id}}" th:text="#{relationships.edit}">Edit</a>
        |
        <a th:href="@{'/relationships/delete/' + ${rel.id}}"
           th:attr="onclick=|return confirm('${#messages.msg('relationships.delete.confirm')}')|"
           th:text="#{relationships.delete}">Delete</a>
      </td>
    </tr>
  </table>

  <div class="empty-state" th:if="${#lists.isEmpty(relationships)}" th:text="#{relationships.empty}">
    No relationships found.
  </div>
</div>

<script th:replace="~{fragments/language-switch :: script}"></script>
</body>
</html>
