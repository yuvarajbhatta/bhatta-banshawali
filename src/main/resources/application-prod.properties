spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Override these via environment variables or deployment-specific config.
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

app.admin.username=${APP_ADMIN_USERNAME:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.dev-user.username=
app.dev-user.password=
app.lineage.default-last-name=${APP_LINEAGE_DEFAULT_LAST_NAME:}
app.lineage.default-gender=${APP_LINEAGE_DEFAULT_GENDER:}
