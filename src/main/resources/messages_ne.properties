lineage.note=यो वंश निर्माणकर्ताले व्यक्तिहरू र आमाबाबु-सन्तान लिंकहरू डाटाबेसमा सेभ गर्छ। छिटो वंश प्रविष्टिका लागि यसलाई प्रयोग गर्नुहोस्, त्यसपछि थप सम्पादनका लागि व्यक्तिहरू र सम्बन्धहरूमा जानुहोस्।
