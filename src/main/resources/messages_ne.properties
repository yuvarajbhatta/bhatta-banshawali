lineage.subtitle=यो पृष्ठ रजिस्टर निर्माणकर्ताजस्तो काम गर्छ। एउटा मूल पुर्खाबाट सुरु गर्नुहोस्, त्यसपछि प्रत्येक व्यक्तिका तल छोरा थप्दै जानुहोस्। तपाईंले सिधै बाकसभित्र टाइप गरेर यही पृष्ठमै वंश विस्तार गर्न सक्नुहुन्छ।
